    snapshot: true
  supplemental_files: ./content/supplemental-ui

asciidoc:
  attributes: {}
  extensions:
    - '@sntke/antora-mermaid-extension'

antora:
  extensions:
    - '@sntke/antora-mermaid-extension'

output:
  dir: ./www
