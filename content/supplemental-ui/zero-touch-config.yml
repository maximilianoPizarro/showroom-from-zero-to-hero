---
type: showroom

# Set the left column width to 30%
default_width: 30
# Persist the URL state so browser refresh doesn't reset the UI
persist_url_state: true

view_switcher:
  enabled: true
  default_mode: split

tabs:
  # OCP Console - uncomment and set DOMAIN for your cluster
  # - name: OCP Console
  #   url: 'https://console-openshift-console.${DOMAIN}'

  # LlamaStack Documentation
  - name: LlamaStack Docs
    url: 'https://llama-stack.readthedocs.io/en/latest/'
